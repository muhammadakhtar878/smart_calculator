<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Calculator</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="assets/icon-192.png" />
  <style>
    /* Add background gradient for the calculator */
    body {
      background: linear-gradient(to right, #ff7e5f, #feb47b);
    }

    .calculator {
      background: linear-gradient(to bottom, #ffffff, #f3f3f3);
      border-radius: 15px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    .btn {
      font-weight: bold;
    }

    .btn-secondary {
      background-color: #6c757d;
      color: #fff;
    }

    .btn-warning {
      background-color: #ffc107;
      color: #fff;
    }

    .btn-danger {
      background-color: #dc3545;
      color: #fff;
    }

    .btn-success {
      background-color: #28a745;
      color: #fff;
    }
  </style>
</head>
<body class="bg-light text-center">

  <div class="container py-4">
    <h2>💸 Smart Calculator</h2>
    <p class="text-muted">Responsive | PWA | Monetized</p>

    <div class="calculator card shadow p-3 mx-auto" style="max-width: 400px;">
      <input type="text" id="display" class="form-control mb-3" readonly />
      <div class="row g-2">
        <!-- Buttons: 7 8 9 / -->
        <div class="col-3"><button class="btn btn-secondary w-100" onclick="append('7')">7</button></div>
        <div class="col-3"><button class="btn btn-secondary w-100" onclick="append('8')">8</button></div>
        <div class="col-3"><button class="btn btn-secondary w-100" onclick="append('9')">9</button></div>
        <div class="col-3"><button class="btn btn-warning w-100" onclick="append('/')">÷</button></div>

        <!-- 4 5 6 * -->
        <div class="col-3"><button class="btn btn-secondary w-100" onclick="append('4')">4</button></div>
        <div class="col-3"><button class="btn btn-secondary w-100" onclick="append('5')">5</button></div>
        <div class="col-3"><button class="btn btn-secondary w-100" onclick="append('6')">6</button></div>
        <div class="col-3"><button class="btn btn-warning w-100" onclick="append('*')">×</button></div>

        <!-- 1 2 3 - -->
        <div class="col-3"><button class="btn btn-secondary w-100" onclick="append('1')">1</button></div>
        <div class="col-3"><button class="btn btn-secondary w-100" onclick="append('2')">2</button></div>
        <div class="col-3"><button class="btn btn-secondary w-100" onclick="append('3')">3</button></div>
        <div class="col-3"><button class="btn btn-warning w-100" onclick="append('-')">−</button></div>

        <!-- 0 . C + = -->
        <div class="col-3"><button class="btn btn-secondary w-100" onclick="append('0')">0</button></div>
        <div class="col-3"><button class="btn btn-secondary w-100" onclick="append('.')">.</button></div>
        <div class="col-3"><button class="btn btn-danger w-100" onclick="clearDisplay()">C</button></div>
        <div class="col-3"><button class="btn btn-warning w-100" onclick="append('+')">+</button></div>

        <div class="col-12 mt-2">
          <button class="btn btn-success w-100" onclick="calculate()">=</button>
        </div>
      </div>
    </div>

    <!-- Ad / Donate section -->
    <div class="mt-4">
      <iframe src="adsense.html" width="100%" height="90" style="border:none;"></iframe>
      <a href="donate.html" class="btn btn-outline-primary mt-2">❤ Support Us</a>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    // Register PWA
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js');
    }
  </script>
</body>
</html>
